name: Build and Deploy (React + Static Blog)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app when package.json exists
        run: |
          if [ -f package.json ]; then
            echo "package.json found -> running Node build"
            npm config set legacy-peer-deps true
            npm ci || npm i
            CI=false npm run build
          else
            echo "No package.json found -> skipping Node build and deploying static site"
          fi

      - name: Prepare publish folder
        run: |
          mkdir -p out
          if [ -d dist ]; then cp -r dist/* out/; fi
          cp -r about out/ || true
          cp -r contact out/ || true
          cp -r services out/ || true
          cp -r partners out/ || true
          cp -r products out/ || true
          cp -r catalogs out/ || true
          cp -r blog out/ || true
          cp -r assets out/ || true
          cp -r ar out/ || true
          cp blog.html out/ || true
          cp index.html out/ || true
          cp style.css out/ || true
          cp 404.html out/ || true
          cp robots.txt out/ || true
          cp sitemap.xml out/ || true
          cp sitemap.xml.blog-fragment out/ || true
          cp CNAME out/ || true
          cp docs/CNAME out/CNAME || true
          cp MOJ.jpg out/ || true
          cp *.png out/ || true
          cp *.webp out/ || true
          cp *.avif out/ || true
          # Single-page-app fallback so clean URLs work
          cp out/index.html out/404.html || true
          echo "Publish folder contents:"; ls -la out

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
